name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive app password hash
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          APP_PASSWORD_HASH: ${{ secrets.APP_PASSWORD_HASH }}
        run: |
          if [ -n "$APP_PASSWORD_HASH" ]; then
            VALUE="$(printf '%s' "$APP_PASSWORD_HASH" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          elif [ -n "$APP_PASSWORD" ]; then
            VALUE="$(printf '%s' "$APP_PASSWORD" | sha256sum | awk '{print $1}')"
          else
            echo "Missing APP_PASSWORD_HASH or APP_PASSWORD repository secret."
            exit 1
          fi

          if ! printf '%s' "$VALUE" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "Invalid password hash format. Expected 64-char SHA-256 hex."
            exit 1
          fi

          echo "VITE_APP_PASSWORD_HASH=$VALUE" >> "$GITHUB_ENV"

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
